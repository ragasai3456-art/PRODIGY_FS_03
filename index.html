<!DOCTYPE html>
<html>
<head>
<title>E-Commerce</title>
<style>
body { font-family: Arial; text-align: center; background:#f4f4f4; }
.container { display:flex; flex-wrap:wrap; justify-content:center; }
.card { background:#fff; padding:15px; margin:15px; border-radius:10px; width:220px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
img { width:150px; height:150px; object-fit:cover; }
button { padding:8px; margin-top:10px; cursor:pointer; }
.controls { margin:20px; }
</style>
</head>
<body>
<h1>🛒 Local Store</h1>
<a href="cart.html">Go to Cart</a>
<div class="controls">
<input type="text" id="search" placeholder="Search products...">
<button onclick="sortLow()">Sort Price Low → High</button>
<input type="number" id="minPrice" placeholder="Min Price">
<input type="number" id="maxPrice" placeholder="Max Price">
<button onclick="filterProducts()">Filter</button>
</div>

<div class="container" id="products"></div>

<script>
const API = "http://localhost:3000/api/products";
let products = [];

async function fetchProducts() {
    const res = await fetch(API);
    products = await res.json();
    display(products);
}

function display(data) {
    const container = document.getElementById("products");
    container.innerHTML = "";

    data.forEach(p => {
        container.innerHTML += `
        <div class="card">
            ${p.image ? `<img src="${p.image}">` : ""}
            <h3>${p.name}</h3>
            <p>₹${p.price}</p>
            <button onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
        </div>`;
    });
}
function addToCart(product) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const existing = cart.find(p => p._id === product._id);

    if (existing) {
        existing.quantity += 1;
    } else {
        product.quantity = 1;
        cart.push(product);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart");
}
document.getElementById("search").addEventListener("input", (e) => {
    const value = e.target.value.toLowerCase();
    const filtered = products.filter(p =>
        p.name.toLowerCase().includes(value)
    );
    display(filtered);
});
function sortLow() {
    const sorted = [...products].sort((a, b) => a.price - b.price);
    display(sorted);
}

fetchProducts();
function filterProducts() {
    let min = document.getElementById("minPrice").value || 0;
    let max = document.getElementById("maxPrice").value || Infinity;

    fetch("http://localhost:3000/api/products")
        .then(res => res.json())
        .then(data => {
            const filtered = data.filter(p => p.price >= min && p.price <= max);
            displayProducts(filtered);
        });
}
</script>

</body>
</html>
